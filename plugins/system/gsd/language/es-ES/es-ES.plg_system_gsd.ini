GSD_ADDRESS="Dirección"
GSD_SITEREP_ADDRESS_DESC="Introduce tu dirección completa para mejorar la calidad de los datos estructurados. Cuantos más detalles proporciones, mayores serán tus posibilidades de obtener resultados enriquecidos y el Panel de Conocimiento en la búsqueda de Google."
GSD_SITEREP_TYPE="Tipo de representación"
GSD_SITEREP_TYPE_DESC="Seleccione si este sitio representa a una persona o a una organización. Debe seleccionar \"Persona\" si, por ejemplo, tiene un blog personal o un portafolio personal para su arte."
GSD_SITEREP_DESC="Descripción"
GSD_SITEREP_DESC_DESC="La descripción de su sitio o entidad. Si se deja en blanco, se utilizará la metadescripción del sitio establecida en la configuración de Joomla."
GSD_KG="Representación del sitio"
GSD_KG_DESC="Ayuda a Google y a otros motores de búsqueda a comprender la identidad de tu sitio y a mostrar información relevante en el panel de información. Los campos a continuación te permiten personalizar cómo se representa tu sitio en los resultados de búsqueda. Según tu configuración, nuestra extensión genera datos estructurados y los añade automáticamente a la página principal de tu sitio."
GSD_KG_PUBLISH="Generar datos estructurados"
GSD_KG_PUBLISH_DESC="El esquema de representación del sitio se añade a la página de inicio por defecto, ya que suele ser la entrada principal y la que mejor representa a tu negocio. Como alternativa, si tienes una página \"Sobre nosotros\" detallada, también es un buen lugar para usarla. No es necesario incluirla en todas las páginas, solo en las páginas clave que describen tu entidad."
GSD_KG_PUBLISH_TO="Agregar datos estructurados a"
GSD_KG_PUBLISH_TO_DESC="Elija dónde agregar los datos estructurados: en la página de inicio, en páginas específicas o seleccione Ningún lugar para deshabilitar la generación de datos estructurados."
GSD_KG_PUBLISH_HOME="Página principal"
GSD_SELECTED_PAGES="Páginas seleccionadas"
GSD_NOWHERE= "En ningún lugar"
GSD_KG_PUBLISH_PAGES_DESC="Seleccione las páginas donde agregar los datos estructurados, como la página \"Sobre nosotros\" o la de \"Contacto\". Resulta útil cuando estas páginas describen mejor la entidad de su sitio web."
GSD_SCHEMA_TEST="Pon a prueba tus datos estructurados"
GSD_SCHEMA_TEST_DESC="Valide sus páginas después de implementar datos estructurados. Comience con la <b>Prueba de Resultados Enriquecidos de Google</b> para ver qué resultados enriquecidos de Google se pueden generar para su página. Para la validación genérica de esquemas, utilice el <b>Validador de Marcado de Esquema </b>para probar todos los tipos de marcado de schema.org, sin la validación específica de Google. Recuerde siempre revalidar sus datos estructurados después de realizar cualquier cambio para garantizar el cumplimiento normativo y una implementación óptima."
GSD_SCHEMA_TEST_ENTER_URL="Introduzca una URL para probar"
GSD_BREADCRUMBS_REMOVE_JOOMLA="Eliminar el esquema de Joomla"
GSD_BREADCRUMBS_REMOVE_JOOMLA_DESC="If you're using the Joomla breadcrumbs module, it generates its own schema markup. Enabling this option will remove the Joomla breadcrumbs schema markup from the page, preventing duplication."
