GSD_SITEREP_ADDRESS_DESC="Ange din fullständiga adress för att förbättra kvaliteten på den strukturerade datan. Ju mer information du anger, desto större är dina chanser att utlösa utökade resultat och kunskapspanelen i Googles sökning."
GSD_SITEREP_TYPE="Representationstyp"
GSD_SITEREP_TYPE_DESC="Välj om webbplatsen representerar en person eller en organisation. Person bör väljas om du till exempel har en personlig blogg eller en personlig portfolio-webbplats för din konst."
GSD_SITEREP_DESC="Beskrivning"
GSD_SITEREP_DESC_DESC="Beskrivningen av din webbplats eller enhet. Om fältet lämnas tomt kommer webbplatsens metabeskrivning som angetts i Joomla-konfigurationen att användas."
GSD_KG="Webbplatsrepresentation"
GSD_KG_DESC="Hjälp Google och andra sökmotorer att förstå din webbplats identitet och visa relevant information i kunskapspanelen. Fälten nedan låter dig anpassa hur din webbplats visas i sökresultaten. Baserat på dina inställningar genererar vårt tillägg strukturerad data och lägger automatiskt till den på din webbplats startsida."
GSD_KG_PUBLISH="Generera strukturerad data"
GSD_KG_PUBLISH_DESC="Schemat för webbplatsrepresentation läggs till på startsidan som standard, eftersom det vanligtvis är den huvudsakliga ingångspunkten och bäst representerar ditt företag. Alternativt, om du har en detaljerad Om oss-sida, är det också ett bra ställe att använda den. Det finns ingen anledning att inkludera det på varje sida – bara på viktiga sidor som beskriver din enhet."
GSD_KG_PUBLISH_TO="Lägg till strukturerad data till"
GSD_KG_PUBLISH_TO_DESC="Välj var du vill lägga till den strukturerade datan: på startsidan, på specifika sidor eller välj Ingenstans för att inaktivera generering av strukturerad data."
GSD_KG_PUBLISH_HOME="Hemsida"
GSD_SELECTED_PAGES="Valda sidor"
GSD_NOWHERE= "Ingenstans"
GSD_KG_PUBLISH_PAGES_DESC="Välj de sidor där du vill lägga till den strukturerade informationen, till exempel sidan Om oss eller Kontakt. Användbart när dessa sidor bättre beskriver din webbplatsentitet."
GSD_SCHEMA_TEST="Testa dina strukturerade data"
GSD_SCHEMA_TEST_DESC="Validera dina sidor efter att du har implementerat strukturerad data. Börja med <b>Google Rich Results Test</b> för att se vilka Google Rich-resultat som kan genereras för din sida. För generisk schemavalidering, använd <b>Schema Markup Validator</b> för att testa alla typer av schema.org-markup, utan Google-specifik validering. Kom ihåg att alltid validera dina strukturerade data efter att du har gjort ändringar för att säkerställa samtycke och optimal implementering."
GSD_SCHEMA_TEST_ENTER_URL="Ange en URL för att testa"
GSD_BREADCRUMBS_REMOVE_JOOMLA="Ta bort Joomla-schemat"
GSD_BREADCRUMBS_REMOVE_JOOMLA_DESC="Om du använder Joomla breadcrumbs-modulen genererar den sin egen schemamarkup. Om du aktiverar det här alternativet tas Joomla breadcrumbs schemamarkup bort från sidan, vilket förhindrar duplicering."
