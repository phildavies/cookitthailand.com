GSD_FAQ_REPEATER_DESC="La lista di domande e risposte.<br><br>La domanda deve includere l'intero testo della domanda stessa e non può contenere contenuto HTML.<br><br>La risposta deve includere l'intero testo della domanda e può contenere contenuto HTML come collegamenti e liste. Tag HTML validi includono: da &lt;h1> a &lt;h6>, &lt;br>, &lt;ol>, &lt;ul>, &lt;li>, &lt;a>, &lt;p>, &lt;div>, &lt;b>, &lt;strong>, &lt;i>, e &lt;em>."
