GSD_FAQ_QUESTION_SELECTOR_DESC="Entrez le sélecteur CSS qui représente l'élément Questions dans le HTML de la page. Vous trouverez ci-dessous quelques exemples valides.<br><br><b>.question<br>h4.question<br>#faqs .question<br>.faqs h2<br>.faqs .class1 h4</b><br><br>Comme le support du sélecteur CSS est très basique, pour les cas avancés, vous pouvez utiliser une requête XPath commençant par le symbole '=', comme dans l'exemple ci-dessous :<br><br><b>=//h1[contains(@class, \\\"faq-question\\\")]</b>"
