PLG_CONVERTFORMSAPPS_EMAIL_ATTACHMENTS="Bilagor"
PLG_CONVERTFORMSAPPS_EMAIL_ATTACHMENTS_DESC="Plats för en fil som ska bifogas i förhållande till roten av ditt webbutrymme. Flera filer kan anges som en kommaseparerad lista."
PLG_CONVERTFORMSAPPS_EMAIL_SENDING_OFF="E-postutskick är avstängt! För att kunna använda e-postappen måste alternativet Skicka e-post som finns under e-postinställningarna i Joomla!s globala inställningar vara aktiverat."
PLG_CONVERTFORMSAPPS_EMAIL_CSS="Email CSS-stilar"
PLG_CONVERTFORMSAPPS_EMAIL_CSS_DESC="Använd anpassade CSS-regler för att formatera ditt e-postmeddelande. CSS-koden du anger här konverteras automatiskt till inline-format för maximal kompatibilitet med e-postklienter. Inkludera inte <style>-taggar – ange endast CSS-regler. OBS! Det är inte alla e-postklienter som stöder CSS-egenskaper."
