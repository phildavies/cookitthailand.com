PLG_CONVERTFORMSAPPS_EMAIL_RECIPIENT_DESC="Vem ska detta e-postmeddelande skickas till? Flera e-postadresser kan anges som en kommaseparerad lista, t.ex. test@example.com, example@example.com."
PLG_CONVERTFORMSAPPS_EMAIL_CC="CC"
