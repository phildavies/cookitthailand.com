PLG_CONVERTFORMSAPPS_EMAIL_BCC="BCC"
PLG_CONVERTFORMSAPPS_EMAIL_BCC_DESC="Skicka detta meddelande till sekundära mottagare, men dölj användarens e-postadress från alla andra som tar emot meddelandet. Flera e-postadresser kan anges som en kommaseparerad lista, t.ex. test@example.com, example@example.com."
PLG_CONVERTFORMSAPPS_EMAIL_FROM_EMAIL="Från"
PLG_CONVERTFORMSAPPS_EMAIL_FROM_EMAIL_DESC="Det här är den e-postadress som visas som avsändare när meddelandet tas emot. Många webbhotell tillåter inte något annat än din domäns administrativa e-postadress här. Att använda någon annan e-postadress här ökar risken avsevärt att ditt e-postmeddelande hamnar i någons skräppostmapp, om din webbhotell ens tillåter att det skickas överhuvudtaget."
PLG_CONVERTFORMSAPPS_EMAIL_FROM_NAME="Från namn"
PLG_CONVERTFORMSAPPS_EMAIL_FROM_NAME_DESC="Detta är namnet som visas som avsändare när meddelandet tas emot."
PLG_CONVERTFORMSAPPS_EMAIL_REPLY_TO="Svara till email"
PLG_CONVERTFORMSAPPS_EMAIL_REPLY_TO_DESC="Använd det här alternativet om du vill att mottagaren ska svara till en annan e-postadress än den som meddelandet skickades från."
PLG_CONVERTFORMSAPPS_EMAIL_REPLY_TO_NAME="Svara till namn"
PLG_CONVERTFORMSAPPS_EMAIL_REPLY_TO_NAME_DESC="Ange det fullständiga namnet på svars-e-postadressen."
PLG_CONVERTFORMSAPPS_EMAIL_SUBJECT="Ämne"
PLG_CONVERTFORMSAPPS_EMAIL_SUBJECT_DESC="Ange en ämnesrad för e-postmeddelandet."
PLG_CONVERTFORMSAPPS_EMAIL_BODY="Meddelandetext"
