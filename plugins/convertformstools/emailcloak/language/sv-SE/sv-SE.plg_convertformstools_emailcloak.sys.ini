PLG_CONVERTFORMSTOOLS_EMAILCLOAK="Convert Forms - Email Cloak Fix"
PLG_CONVERTFORMSTOOLS_EMAILCLOAK_DESC="Om Joomlas Email Cloak-plugin är aktiverat kommer det att bearbeta e-postadresserna i Convert Forms, vilket bryter layouten.<br><br>Denna plugin ersätter tillfälligt e-postadresser som finns i formuläret med unika hashvärden innan innehållet bearbetas av Email Cloak-pluginen. Efter att innehållet har bearbetats återställs de ursprungliga e-postadresserna.<br><br>Om du inte använder Joomlas Email Cloak-plugin kan du inaktivera det för att förbättra prestandan."
