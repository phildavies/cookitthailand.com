COM_CONVERTFORMS_RECAPTCHA_V3="v3"
COM_CONVERTFORMS_FIELD_RECAPTCHA_VERSION_DESC="Välj vilken reCAPTCHA-version som ska användas.<br><br><strong>v2 Kryssruta</strong>: Visar en kryssruta för användaren som de måste markera för att bekräfta att de inte är en bot.<br><br><strong>v2 Osynlig</strong>: Kräver ingen åtgärd från användaren, eftersom den körs i bakgrunden och verifierar användarens handlingar automatiskt.<br><br><strong>v3</strong>:  Använder ett poängsystem för att utvärdera användarens beteende och avgöra om de är en bot eller inte. Det kräver ingen användarinteraktion, utan körs istället i bakgrunden och tilldelar en poäng till varje användare baserat på deras aktivitet på webbplatsen."
COM_CONVERTFORMS_INVALID_RECAPTCHA_KEYS="Ogiltiga reCAPTCHA nycklar"
COM_CONVERTFORMS_RECPATCHA_V3_SCORE="Poäng"
COM_CONVERTFORMS_RECPATCHA_V3_SCORE_DESC="ReCAPTCHA v3 använder ett \"poängsystem\" för att avgöra om webbplatsinteraktioner kommer från människor eller bottar. Poängen varierar från 0,0 till 1,0, där 1,0 är det mest människolika.<br><br>Du kan börja med en grundpoäng på 0.5, använd reCAPTCHA-instrumentpanelen för att granska dina bidrag och justera tröskelvärdet efter hur dina användare interagerar med din webbplats. Poäng över tröskelvärdet anses acceptabla, medan de under det kan flaggas som misstänkta och hanteras därefter."
COM_CONVERTFORMS_RECAPTCHA_V3_SCORE_REQUIRED="Ett giltigt poängvärde måste anges!"
