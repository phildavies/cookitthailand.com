COM_CONVERTFORMS_TIME_TO_SUBMIT_ENABLE="Aktivera en minsta tid att skicka in svar"
COM_CONVERTFORMS_TIME_TO_SUBMIT="Minsta tid för svar"
COM_CONVERTFORMS_TIME_TO_SUBMIT_ENABLE_DESC="När det här alternativet är aktiverat hjälper det till att förhindra skräppost genom att kräva att användarna lägger ner en viss tid på formuläret innan de skickar in det. De flesta skräppostrobotar fyller i och skickar in formulär nästan omedelbart genom att mata in data i formulärfält och kringgå normal användarinteraktion. Riktiga användare tar däremot tid på sig att läsa formuläret, ange sina uppgifter och granska sina inmatningar. Genom att ställa in en obligatorisk tidsfördröjning kan du filtrera bort automatiserade inskick och minska skräpposten."
COM_CONVERTFORMS_TIME_TO_SUBMIT_DESC="Ange det minsta antalet sekunder en användare måste spendera på formuläret innan det skickas in. Om ett formulär skickas in snabbare än denna tid kommer det att blockeras som skräppost."
