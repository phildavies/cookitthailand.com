COM_CONVERTFORMS_RESIZE_IMAGES_DESC="Aktivera att endast ändra storlek på bilder som laddas upp via filuppladdningsfältet. Bildernas storlek ändras när formuläret skickas in. Att ändra storlek på en bild behåller dess bildförhållande, förutom när alternativet Anpassad storlek används. Anpassad storlek ändrar bildens storlek till de angivna måtten genom att beskära bilden."
