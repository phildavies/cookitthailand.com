COM_CONVERTFORMS_RECAPTCHA_FIELD_DEPRECATION="Detta reCAPTCHA-fält kommer att föråldras eftersom det ersätts av det nya fältet \"reCAPTCHA\" som innehåller alla versioner av reCAPTCHA."
