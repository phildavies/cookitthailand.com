COM_CONVERTFORMS_FILEUPLOAD_UPLOAD_TYPES="Tillåtna filtyper"
COM_CONVERTFORMS_FILEUPLOAD_UPLOAD_TYPES_DESC="Ange en kommaseparerad lista över tillåtna filtyper som: </b>.jpg, .gif, .png, .pdf<br><br>Du kan ange medietyper som: application/pdf, images/*, video/* eller så kan du blanda båda: application/*, .png, .jpg<br><br>OBS: Detta är inte idiotsäkert och kan luras, kom ihåg att det alltid finns en fara med att låta användare ladda upp filer.<br><br>PHP-tillägget <b>fileinfo</b> måste installeras för att gissa filtypen."
