COM_CONVERTFORMS_HONEYPOT="Honeypot-skydd"
COM_CONVERTFORMS_HONEYPOT_DESC="Honeypot-tekniken hjälper till att förhindra skräppost genom att lägga till ett dolt fält i formuläret som mänskliga användare inte kan se eller interagera med. Botar fyller dock ofta i alla fält, inklusive det dolda, vilket gör det möjligt att upptäcka och blockera dem.<br><br><b>Honeypot v1</b>: Använder ett fast dolt fältnamn för att fånga spambottar. Även om det är effektivt kan vissa avancerade bottar känna igen och kringgå det.<br><br><b>Honeypot v2</b>: Använder ett dynamiskt genererat fält med ett unikt namn för varje session, vilket gör det svårare för botar att upptäcka. Den här versionen fungerar också sömlöst med cachningsmekanismer, vilket säkerställer tillförlitligt skräppostskydd på cachade sidor."
