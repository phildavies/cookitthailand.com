COM_CONVERTFORMS_FILEUPLOAD_FOLDER_TYPE="Uppladdningsplats"
COM_CONVERTFORMS_FILEUPLOAD_FOLDER_TYPE_DESC="Ange en målmapp för uppladdade filer.<br><br><b>Auto</b>: Filerna kommer att laddas upp till mappen /media/com_convertforms/uploads. Dessutom kommer ett slumpmässigt prefix att läggas till i början av varje filnamn för att öka säkerheten.<br><br><b>Egen</b>: Ange en anpassad målmapp och metod för namngivning."
COM_CONVERTFORMS_FILEUPLOAD_FOLDER="Anpassad uppladdningsmål"
COM_CONVERTFORMS_FILEUPLOAD_FOLDER_DESC="Ange sökvägen i förhållande till roten av ditt webbutrymme där de uppladdade filerna ska lagras. För att byta namn på uppladdade filer, använd följande smarta taggar.<br><br><b>{file.basename}</b>: cat.jpg<br><b>{file.extension}</b>: jpg<br><b>{file.filename}</b>: cat<b><br>{file.index}</b>: indexsiffra<br><br>Den kan också acceptera globala smarta taggar som {year}, {month}, {user.id} eller {randomid} för att skapa ett ännu mer dynamiskt uppladdningsmål."
COM_CONVERTFORMS_FILEUPLOAD_LIMIT_FILES="Filantal"
