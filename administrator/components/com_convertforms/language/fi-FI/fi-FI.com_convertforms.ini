COM_CONVERTFORMS_INPUT_MASK="Syöttömaski"
COM_CONVERTFORMS_INPUT_MASK_DESC="Auttaa käyttäjää syötteessä varmistamalla ennalta määritetty muoto. <br><br><b>Syntaksi:</b><br>9: Numeerinen(0-9)<br>a: Aakkosellinen (a-z or A-Z)<br>A: Aakkosellinen iso (A-Z)<br>*: Aakkosnumeerinen (0-9, a-z, or A-Z)<br>&: Aakkosnumeerinen iso (0-9 or A-Z)<br><br><b>Esimerkiksi</b>:<br>Puhelin: +1 (999)-9999<br>Päivämäärä: 99/99/9999<br>Postinumero: 99999?-9999"
