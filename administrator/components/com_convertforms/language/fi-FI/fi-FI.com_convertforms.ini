COM_CONVERTFORMS_FIELD_RECAPTCHA_VERSION_DESC="Valitse käytettävä reCAPTCHA-versio.<br><br><strong>v2 Valintaruutu</strong>: Näyttää käyttäjälle valintaruudun, joka hänen on valittava vahvistaakseen, ettei hän ole botti.<br><br><strong>v2 Näkymätön</strong>: Ei vaadi käyttäjältä mitään toimia, koska se toimii taustalla ja tarkistaa käyttäjän toimet automaattisesti.<br><br><strong>v3</strong>: Käyttää pisteytysjärjestelmää käyttäjän toiminnan arvioimiseen ja sen määrittämiseen, onko hän botti vai ei. Se ei vaadi käyttäjän toimia, vaan toimii taustalla ja antaa jokaiselle käyttäjälle pisteytyksen heidän sivustolla tekemänsä toiminnan perusteella."
COM_CONVERTFORMS_INVALID_RECAPTCHA_KEYS="Virheelliset reCAPTCHA-avaimet"
COM_CONVERTFORMS_RECPATCHA_V3_SCORE="Pisteet"
COM_CONVERTFORMS_RECPATCHA_V3_SCORE_DESC="ReCAPTCHA v3 käyttää pisteytysjärjestelmää sen määrittämiseen, ovatko verkkosivuston toiminnot ihmisten vai bottien tekemiä. Pisteytys vaihtelee välillä 0,0–1,0, jossa 1,0 on ihmismäisin.<br><br>Aloita 0,5:n peruspistemäärällä, käytä reCAPTCHA-hallintapaneelia lähetystesi tarkistamiseen ja säädä kynnystä sen mukaan, miten käyttäjäsi ovat vuorovaikutuksessa sivustosi kanssa. Kynnyksen ylittävät pisteet katsotaan hyväksyttäviksi, kun taas kynnyksen alapuolella olevat pisteet voidaan merkitä epäilyttäviksi ja käsitellä sen mukaisesti."
