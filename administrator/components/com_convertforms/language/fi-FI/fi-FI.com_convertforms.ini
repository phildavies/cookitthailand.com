COM_CONVERTFORMS_PHPSCRIPT="PHP scripti"
COM_CONVERTFORMS_PHPSCRIPT_FORM_DISPLAY="Lomakkeen näyttö"
COM_CONVERTFORMS_PHPSCRIPT_FORM_DISPLAY_DESC="Tälle alueelle lisätty PHP-skripti suoritetaan juuri ennen lomakkeen näyttämistä.<br><br>Tällä alueella pääpaino on <b>$formLayout</b> (String)-muuttujassa, joka sisältää lomakkeen HTML-koodin.<br><br>Lomakeasetusten käyttämiseksi käytä muotoa <b>$form</b> (Array) muuttuja.<br><br>Tunnisteita &lt;?php and ?>  ei tarvitse sisällyttää."
COM_CONVERTFORMS_PHPSCRIPT_FORM_PROCESS="Lomakeprosessi"
COM_CONVERTFORMS_PHPSCRIPT_FORM_PROCESS_DESC="Tälle alueelle lisätty PHP-koodi suoritetaan juuri ennen lomaketietojen tallentamista tietokantaan riippumatta siitä, onko lähetys kelvollinen vai ei.<br><br>Tämä alue on varsin hyödyllinen, kun joudut käsittelemään laskelmia, suorittamaan tarkennettau validointia tai muuttamaan kentän arvoa. Kaikki tässä tehdyt muutokset <b>$post</b> (Array) -muuttujaan heijastuvat lähetysmerkinnässä.<br><br>Lomakeasetusten käyttämiseksi käytä <b>$form</b> (Array) muuttujaa. <br><br>Tunnisteita &lt;?php and ?> ei tarvitse sisällyttää."
COM_CONVERTFORMS_PHPSCRIPT_AFTER_FORM_SUBMISSION="Lomakkeen lähettämisen jälkeen"
COM_CONVERTFORMS_PHPSCRIPT_AFTER_FORM_SUBMISSION_DESC="Tälle alueelle lisätty PHP-koodi suoritetaan, kun lomake on lähetetty onnistuneesti ja tiedot on tallennettu tietokantaan. <br><br>Tämä on varsin hyödyllistä, kun yrität suorittaa joitain ylimääräisiä tehtäviä, kuten lähettää tietoja hiljaisesti toiseen URL-osoitteeseen. Voit käyttää lopullista lähetystä <b>$submission</b> (Object) muuttujalla.<br><br>Lomakeasetusten käyttämiseksi käytä <b>$form</b> (Array) muuttujaa. <br><br>Tunnisteita &lt;?php and ?> ei tarvitse sisällyttää."
COM_CONVERTFORMS_PHPSCRIPT_NOTE="PHP-skriptejä ei suoriteta taustalla, jotta vältetään ongelmat lomakkeen esikatselun kanssa. Testaa aina käyttöliittymässä."
COM_CONVERTFORMS_FIELD_PASSWORD="Salasana"
COM_CONVERTFORMS_FIELD_PASSWORD_DESC="Antaa tavan, jolla käyttäjä voi kirjoittaa salasanan turvallisesti"
COM_CONVERTFORMS_FIELD_CONFIRM_TYPE="Vahvista kenttätyyppi"
COM_CONVERTFORMS_FIELD_CONFIRM_TYPE_DESC="Valitse vahvistuskentän syöttötyyppi Teksti ja Salasana välillä."
