COM_CONVERTFORMS_HONEYPOT="Honeypot suojaus"
COM_CONVERTFORMS_HONEYPOT_DESC="Honeypot-tekniikka auttaa estämään roskapostia lisäämällä lomakkeeseen piilotetun kentän, jota ihmiskäyttäjät eivät voi nähdä tai jonka kanssa he eivät voi olla vuorovaikutuksessa. Botit kuitenkin usein täyttävät kaikki kentät, myös piilotetun, mikä mahdollistaa niiden havaitsemisen ja estämisen.<br><br><b>Honeypot v1</b>: Käyttää kiinteää piilotetun kentän nimeä roskapostibottien pysäyttämiseen. Vaikka se on tehokas, jotkin edistyneet botit saattavat tunnistaa ja ohittaa sen.<br><br><b>Honeypot v2</b>: Käyttää dynaamisesti luotua kenttää, jolla on jokaiselle istunnolle yksilöllinen nimi, mikä vaikeuttaa bottien havaitsemista. Tämä versio toimii myös saumattomasti välimuistimekanismien kanssa varmistaen luotettavan roskapostisuojauksen välimuistissa olevilla sivuilla."
COM_CONVERTFORMS_FIELD_FILEUPLOAD="Tiedoston lataus"
COM_CONVERTFORMS_FIELD_FILEUPLOAD_DESC="Anntaa käyttäjälle mahdollisuuden ladata tiedostoja"
COM_CONVERTFORMS_FILEUPLOAD_TEMP_FOLDER_NOT_WRITABLE="Sivustosi väliaikaiskansio on asetettu arvoon <b>%s</b> mutta siihen ei voi kirjoittaa. Määritä kirjoitettava väliaikaiskansio."
COM_CONVERTFORMS_FILEUPLOAD_FOLDER_TYPE="Latauskohde"
COM_CONVERTFORMS_FILEUPLOAD_FOLDER_TYPE_DESC="Määritä ladattujen tiedostojen kohdekansio.<br><br><b>Automaattinen</b>: Tiedostot ladataan kansioon /media/com_convertforms/uploads. Lisäksi jokaisen tiedostonimen alkuun lisätään satunnainen etuliite turvallisuuden lisäämiseksi.<br><br><b>Mukautettu</b>: Määritä mukautettu kohdekansio ja nimeämiskäytäntö."
COM_CONVERTFORMS_FILEUPLOAD_FOLDER="Mukautettu latauskohde"
COM_CONVERTFORMS_FILEUPLOAD_FOLDER_DESC="Anna polku suhteessa web-levytilasi juureen, johon ladatut tiedostot tallennetaan. Voit nimetä ladatut tiedostot uudelleen seuraavien älytunnisteiden avulla.<br><br><b>{file.basename}</b>: cat.jpg<br><b>{file.extension}</b>: jpg<br><b>{file.filename}</b>: cat<b><br>{file.index}</b>: index numero<br><br>Se voi myös hyväksyä globaaleja älykkäitä tunnisteita, kuten {year}, {month}, {user.id} tai {randomid}, mikä luo entistä dynaamisemman latauskohteen."
COM_CONVERTFORMS_FILEUPLOAD_LIMIT_FILES="Tiedostojen määrä"
COM_CONVERTFORMS_FILEUPLOAD_LIMIT_FILES_DESC="Kuinka monta tiedostoa voi ladata? Syötä 0 ilman rajoitusta."
COM_CONVERTFORMS_FILEUPLOAD_MAX_FILE_SIZE="Tiedoston kokoraja"
COM_CONVERTFORMS_FILEUPLOAD_MAX_FILE_SIZE_DESC="Määritä jokaiselle ladatulle tiedostolle suurin sallittu koko megatavuina. Syötä 0 ilman rajoitusta. Palvelimesi asetuksen enimmäiskoko on:. <b>%s</b>."
COM_CONVERTFORMS_FILEUPLOAD_UPLOAD_TYPES="Sallitut tiedostotyypit"
COM_CONVERTFORMS_FILEUPLOAD_UPLOAD_TYPES_DESC="Anna pilkuilla erotettu luettelo sallituista tiedostotyypeistä, kuten: </b>.jpg, .gif, .png, .pdf<br><br>Voit syöttää mediatyyppejä, kuten: application/pdf, images/*, video/* tai voit käyttää molempia.: application/*, .png, .jpg<br><br>Huomautus: Tämä ei ole täysin varma ja sitä voidaan huijata. Muista, että tiedostojen lataamiseen palvelimelle on aina olemassa vaara.<br><br>PHP-laajennus <b>tiedostotiedot</b> on asennettava tiedostotyypin arvaamiseksi."
COM_CONVERTFORMS_FILEUPLOAD_EMPTY_FILE_TYPES_NOT_ALLOWED="Sallitut tiedostotyypit -kenttää ei voi jättää tyhjäksi. Määritä vähintään yksi kelvollinen tiedostopääte."
COM_CONVERTFORMS_FILEUPLOAD_EMPTY_FILE_EXTENSION_NOT_ALLOWED="Sallitut tiedostotyypit -luettelossa ei sallita tyhjää tiedostopäätettä. Määritä kelvollinen tiedostopääte."
COM_CONVERTFORMS_FIELD_FILTER="Suodatin"
COM_CONVERTFORMS_FIELD_FILTER_DESC="Suodata käyttäjän syötteet seuraavien suodattimien perusteella.<br><b>Text</b>: Muuntaa syötteen selkeäksi tekstimerkkijonoksi; poistaa kaikki tunnisteet / määritteet.<br><b>Safe HTML</b>: Hyväksy vain turvalliset HTML-elementit, kuten.<br><b>Alfa-numero</b>: Salli vain a-z ja 0-9<br><b>Word</b>: Salli vain merkit a-z, ja alaviivat<br><b>Integer</b>: Käytä vain ensimmäisen numeron arvoa<br><b>Float</b>: Salli vain merkit a-z, ja alaviivat"
