COM_CONVERTFORMS_TIME_TO_SUBMIT_ENABLE_DESC="Kun tämä vaihtoehto on käytössä, se auttaa estämään roskapostia vaatimalla käyttäjiä viettämään lomakkeen parissa vähimmäisajan ennen sen lähettämistä. Useimmat roskapostibotit täyttävät ja lähettävät lomakkeet lähes välittömästi syöttämällä tietoja lomakekenttiin ja ohittamalla normaalin käyttäjän vuorovaikutuksen. Sitä vastoin todelliset käyttäjät vievät aikaa lomakkeen lukemiseen, tietojensa syöttämiseen ja syötteiden tarkistamiseen. Asettamalla vaaditun aikaviiveen voit suodattaa automaattiset lähetykset ja vähentää roskapostia."
