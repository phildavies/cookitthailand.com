COM_CONVERTFORMS_PHPSCRIPT_FORM_DISPLAY_DESC="L'script PHP afegit a aquesta àrea s'executarà just abans de mostrar el formulari.<br><br>L'interès principal a aquesta àrea és la variable <b>$formLayout</b> (cadena) que conté el codi HTML del formulari.<br><br>Per accedir a la configuració del formulari utilitza la variable <b>$form</b> (array).<br><br>No cal que incloguis les etiquetes &lt;php i ?>"
COM_CONVERTFORMS_PHPSCRIPT_FORM_PROCESS="Processat del formulari"
COM_CONVERTFORMS_PHPSCRIPT_FORM_PROCESS_DESC="El codi PHP afegit a aquesta àrea s'executarà just abans que les dades del formulari es guardin a la base de dades independentment que siguin vàlides o no..<br><br>Això és bastant útil quan necessitat processar càlculs, fer validacions avançades o modificar el valor d'un camp. Qualsevol modificacions a la variable <b>$post</b> (Array) que es facin aquí, es reflectiran a la resposta.<br><br>Per accedir a la configuració del formulari utilitza la variable <b>$form</b> (array).<br><br>No cal que incloguis les etiquetes &lt;php i ?>"
COM_CONVERTFORMS_PHPSCRIPT_AFTER_FORM_SUBMISSION="Després de processar el formulari"
COM_CONVERTFORMS_PHPSCRIPT_AFTER_FORM_SUBMISSION_DESC="El codi PHP afegit a aquesta àrea s'executarà després que les dades del formulari s'enviïn i es guardin a la base de dades.<br><br>Això és bastant útil quan intentes fer alguna tasca extra com enviar dades de manera silenciosa a una altra URL. Pots accedir a la resposta final utilitzant la variable <b>$submission</b> (Object).<br><br>Per accedir a la configuració del formulari utilitza la variable <b>$form</b> (array).<br><br>No cal que incloguis les etiquetes &lt;php i ?>"
