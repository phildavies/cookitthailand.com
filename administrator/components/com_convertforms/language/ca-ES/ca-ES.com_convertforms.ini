; COM_CONVERTFORMS_HONEYPOT_DESC="The Honeypot technique helps prevent spam by adding a hidden field to the form that human users cannot see or interact with. Bots, however, often fill out all fields, including the hidden one, which allows to detect and block them.<br><br><b>Honeypot v1</b>: Uses a fixed hidden field name to catch spam bots. While effective, some advanced bots may recognize and bypass it.<br><br><b>Honeypot v2</b>: Uses a dynamically generated field with a unique name for each session, making it harder for bots to detect. This version also works seamlessly with caching mechanisms, ensuring reliable spam protection on cached pages."
