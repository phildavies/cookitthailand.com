COM_CONVERTFORMS_FILEUPLOAD_UPLOAD_TYPES_DESC="Introduïu la llista separada per comes dels tipus de fitxer permesos com ara: </b> .jpg, .gif, .png, .pdf. <br><br>Podeu introduir tipus de mèdia com aplicació/pdf, imatges/*, vídeo/* o podeu barrejar tots dos: application/*, .png, .jpg<br><br>. Nota: això no és infal·lible i pot ser enganyòs, recordeu que sempre hi ha perill en permetre als usuaris pujar fitxers. <br><br>Cal instal·lar l'extensió PHP <b>fileinfo</b> per endevinar el tipus de fitxer."
