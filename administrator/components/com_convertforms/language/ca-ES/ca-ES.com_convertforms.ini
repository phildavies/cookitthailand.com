COM_CONVERTFORMS_FIELD_RECAPTCHA_VERSION_DESC="Seleccioneu quina versió de reCAPTCHA utilitzar.<br><br><strong>v2 Casella de selecció</strong>: mostra una casella de selecció a l'usuari, que ha de comprovar per confirmar que no és un bot.<br><strong>v2 Invisible</strong>: no requereix cap acció de l'usuari, ja que s'executa en segon pla i verifica automàticament les accions de l'usuari.<br><br><strong>v3</strong>: utilitza un sistema de puntuació per avaluar el comportament de l'usuari i determinar si és un bot o no. No requereix cap interacció de l'usuari, sinó que s'executa en segon pla i assigna una puntuació a cada usuari en funció de la seva activitat al lloc."
COM_CONVERTFORMS_INVALID_RECAPTCHA_KEYS="Les claus reCAPTCHA no són vàlides"
COM_CONVERTFORMS_RECPATCHA_V3_SCORE="Puntuació"
COM_CONVERTFORMS_RECPATCHA_V3_SCORE_DESC="ReCAPTCHA v3 utilitza un sistema de \\\"puntuació\\\" per determinar si les interaccions del lloc web són humans o robots. La puntuació oscil·la entre 0,0 i 1,0, essent l'1,0 la més semblant a l'humà. <br><br>Hauríeu de començar amb una puntuació base de 0,5, utilitzeu el tauler de control de reCAPTCHA per revisar els vostres enviaments i ajustar el llindar segons com els usuaris interactuen amb el vostre lloc. Les puntuacions per sobre del llindar es consideren acceptables, mentre que les per sota del llindar es poden marcar com a sospitoses i tractar-se en conseqüència."
COM_CONVERTFORMS_RECAPTCHA_V3_SCORE_REQUIRED="Cal establir una puntuació vàlida!"
